packages:
  - 'apps/*'
  - 'packages/*'

# Native modules + tooling whose postinstall build scripts we trust.
# All were running fine via npm before the workspace migration.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  onnxruntime-node: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
